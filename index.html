<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Finance Tracker</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="styles/responsive.css" />
    <script type="module" src="scripts/app.js"></script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header>
      <!--Welcome-->
      <h1>Akiba Finance Tracker</h1>

      <h2>Check out your financial situation</h2>
    </header>

    <nav>
      <ol aria-label="Main navigation">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="transactions.html">Transactions</a></li>
        <li><a href="budgets.html">Budgets</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ol>
    </nav>

    <main id="main-content">
      <!--Main Section-->
      <section id="transaction-recent">
        <!--Summary of transactions-->
        <h2>Recent Transactions</h2>
        <div class="trans-cards"></div>
      </section>

      <section id="trans-details">
        <!--Transaction Details section-->
        <h2>Transaction Details</h2>
        <div class="details-content"></div>
        <!--panel that shows in detail the chosen transaction-->
      </section>

      <!--'Add Transaction' Form... JS will load form once button is clicked.-->
      <section id="trans-form-section">
        <form id="transactionform">
          <fieldset>
            <legend>Add New Transaction</legend>
            <input type="hidden" id="trans-id" name="trans-id" />
            <label for="trans-summary">Summary</label>
            <input
              type="text"
              id="trans-summary"
              name="trans-summary"
              required
            />

            <label for="trans-cost">Cost</label>
            <input
              type="number"
              step="0.01"
              min="0"
              id="trans-cost"
              name="trans-cost"
              required
            />

            <label for="trans-currency">Currency</label>
            <select id="trans-currency" name="trans-currency">
              <option value="USD">USD</option>
              <option value="KES">KES</option>
              <option value="RwF">RwF</option>
            </select>

            <label for="trans-location-city">Location</label>
            <select
              id="trans-location-city"
              name="trans-location-city"
              required
            >
              <option value="">Please choose a city</option>
              <option value="Nairobi">Nairobi</option>
              <option value="Kigali">Kigali</option>
            </select>

            <label for="trans-date">Date</label>
            <input type="date" id="trans-date" name="trans-date" required />

            <label for="trans-category">Category</label>
            <select id="trans-category" name="trans-category" required>
              <option value="">Please choose an option</option>
              <option value="Food">Food</option>
              <option value="Books">Books</option>
              <option value="Transport">Transport</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Health">Health</option>
            </select>
            <button
              id="transdetails-submit"
              class="btn btn-primary"
              type="submit"
            >
              Submit Transaction
            </button>
            <button
              id="transdetails-cancel"
              type="button"
              class="btn btn-secondary"
            >
              Cancel
            </button>
            <!--With Confirmation-->
          </fieldset>
        </form>
      </section>
      <br />
      <button id="addtransaction-btn" class="btn btn-primary">
        Add Transaction
      </button>
    </main>
    <footer>
      <p>Created by Nadiv Gicheru 😜</p>
      <p>&copy; 2026</p>
    </footer>
  </body>
</html>
