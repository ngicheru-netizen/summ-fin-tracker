<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Finance Tracker</title>
  </head>
  <body>
    <header>
      <!--Welcome-->
      <h1>Student Finance Tracker</h1>

      <h2>Welcome Back, John Doe</h2>
    </header>

    <!-- Collapsible Navigation Banner Section -->
    <nav>
      <ol aria-label="Main navigation">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="transactions.html">Transactions</a></li>
        <li><a href="budgets.html">Budgets</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ol>
    </nav>

    <main>
      <!--Main Section-->
      <section id="transaction-recent">
        <!--Summary of transactions-->

        <h2>Recent Transactions</h2>
        <div class="trans-cards">
          <article class="card" data-id="">
            <h3>Coffee</h3>
            <dl>
              <dt>Cost</dt>
              <dd></dd>
              <dt>Date</dt>
              <dd></dd>
              <dt>Category</dt>
              <dd></dd>
            </dl>
          </article>

          <!-- JS will populate these -->
        </div>
      </section>

      <section id="trans-details" hidden>
        <!--Transaction Details section-->
        <h2>Transaction Details</h2>
        <!--panel that shows in detail the chosen transaction-->
      </section>

      <!--'Add Transaction' Form... JS will load form once button is clicked.-->
      <section id="trans-form" hidden>
        <form id="transactionform">
          <fieldset>
            <legend>Add New Transaction</legend>
            <input type="hidden" id="trans-id" name="trans-id" />
            <label for="trans-summary">Summary</label>
            <input
              type="text"
              id="trans-summary"
              name="trans-summary"
              required
            />

            <label for="trans-cost">Cost</label>
            <input type="number" id="trans-cost" name="trans-cost" required />

            <label for="trans-location-city">Location</label>
            <select
              id="trans-location-city"
              name="trans-location-city"
              required
            >
              <option value="">Please choose a city</option>
              <option value="Nairobi">Nairobi</option>
              <option value="Kigali">Kigali</option>
            </select>

            <label for="trans-date">Date & Time</label>
            <input
              type="datetime-local"
              id="trans-date"
              name="trans-date"
              required
            />

            <label for="trans-category">Category</label>
            <select id="trans-category" name="trans-category" required>
              <option value="">Please choose an option</option>
              <option value="Food">Food</option>
              <option value="Books">Books</option>
              <option value="Transport">Transport</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Health">Health</option>
            </select>
            <button id="transdetails-submit">Submit Transaction</button>
            <button id="transdetails-cancel" type="button">Cancel</button>
            <!--With Confirmation-->
          </fieldset>
        </form>
      </section>
      <br />
      <button id="addtranscation-btn">Add Transaction</button>
    </main>
    <footer>
      <p>Created by Nadiv Gicheru 😜</p>
      <p>&copy; 2026</p>
    </footer>
  </body>
</html>
