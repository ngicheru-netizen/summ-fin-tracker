<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Finance Tracker</title>
  </head>
  <body>
    <section>
      <!--Welcome-->
      <div><h1>Student Finance Tracker</h1></div>
      <div>
        <h2>Welcome Back, John Doe</h2>
      </div>
    </section>
    <section>
      <!-- Collapsible Navigation Banner Section -->
      <nav>
        <ol aria-label="Main navigation">
          <li>Home</li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="transactions.html">Transactions</a></li>
          <li><a href="budgets.html">Budgets</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="settings.html">Settings</a></li>
        </ol>
      </nav>
    </section>
    <main>
      <!--Main Section-->
      <section>
        <!--Summary of transactions-->
        <div>
          <h3>Summary</h3>
          <table>
            <!--This will be populated by the most recent transactions-->
            <!--Figure out how to populate/retrieve data-->
          </table>
        </div>
      </section>
      <section>
        <!--Transaction Details section-->
        <!--This will be a panel that shows in detail the chosen transaction-->
      </section>
      <section>
        <!--Add Transaction button. This will load a screen to add new transactions -->
        <button id="transdetails-btn">Add Transaction</button>
        <form id="transdetails">
          <label for="trans-summary">Summary</label>
          <input type="text" id="trans-summary" name="trans-summary" required />

          <label for="trans-cost">Cost</label>
          <input type="number" id="trans-cost" name="trans-cost" required />

          <label for="trans-location">Location</label>
          <input
            type="text"
            id="trans-location"
            name="trans-location"
            required
          />

          <label for="trans-date">Date & Time</label>
          <input
            type="datetime-local"
            id="trans-date"
            name="trans-date"
            required
          />

          <label for="trans-category">Category</label>
          <select id="trans-category" name="trans-category" required>
            <option value="">Please choose an option</option>
            <option value="Food">Food</option>
            <option value="Books">Books</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
          </select>
          <button id="transdetails-submit">Submit Transaction</button>
        </form>
      </section>
    </main>
    <footer>
      <p>Created by Nadiv Gicheru 😜</p>
      <p>&copy; 2026</p>
    </footer>
  </body>
</html>
