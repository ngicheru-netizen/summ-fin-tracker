<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transactions</title>
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="styles/responsive.css" />
    <script type="module">
      import { initTransactions } from "./scripts/state.js";
      import {
        renderRecentTable,
        setupAddTransactionToggle,
        setupSortHeaders,
        setupSearch,
        setupTableActions,
        setupFormSubmission,
        setupExportBtn,
      } from "./scripts/ui.js";
      window.addEventListener("DOMContentLoaded", () => {
        initTransactions();
        renderRecentTable();
        setupAddTransactionToggle();
        setupSortHeaders();
        setupSearch();
        setupTableActions();
        setupFormSubmission();
        setupExportBtn();
      });
    </script>
  </head>
  <body>
    <header>
      <h1>Your Transactions</h1>
    </header>
    <nav>
      <ol aria-label="Main navigation">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="transactions.html">Transactions</a></li>
        <li><a href="budgets.html">Budgets</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ol>
    </nav>
    <main>
      <section>
        <!-- export -->
        <div>
          <button id="export-btn" class="btn btn-primary">
            Export Transactions
          </button>
        </div>
      </section>
      <section>
        <!--Search Filter Form for transactions-->
        <form id="search-form">
          <input
            type="text"
            id="trans-search"
            placeholder=" Search transactions"
          />
        </form>

        <h2>Transaction History</h2>
        <table data-sort-column="table" data-sort-direction="asc">
          <thead>
            <tr>
              <th data-sort="id">Transaction ID</th>
              <th>Description</th>
              <th data-sort="amount">Amount</th>
              <th data-sort="category">Category</th>
              <th data-sort="date">Date</th>
              <th data-sort="createdAt">Created</th>
              <th data-sort="editedAt">Last Edited</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody>
            <!-- This will be populated by the transaction history data -->
            <!-- Delete Later... Each row will have: -->
            <!-- <tr data-id="txn_001"> -->
            <!--   <td>...</td> (for each column) -->
            <!--   <td> -->
            <!--     <button class="trans-edit-btn">Edit</button> -->
            <!--     <button class="trans-del-btn">Delete</button> -->
            <!--   </td> -->
            <!-- </tr> -->
          </tbody>
        </table>
      </section>

      <!--Transaction Details Panel-->

      <section id="trans-details">
        <h2>Transaction ID</h2>
        <div class="details-content"></div>
      </section>
      <!--'Add Transaction' Form... JS will load form once button is clicked.-->
      <!---->
      <!---->
      <!---->
      <!---->
      <!---->
      <!-------------------------Transaction Form------------------------------->
      <section id="trans-form-section" hidden>
        <!--'Add Transaction' Form... JS will load form once button is clicked.-->

        <form id="transactionform">
          <fieldset>
            <legend>Add/Edit Transaction</legend>
            <input type="hidden" id="trans-id" name="trans-id" />
            <label for="trans-summary">Summary</label>
            <input id="trans-summary" name="trans-summary" required />

            <label for="trans-cost">Cost</label>
            <input
              type="number"
              step="0.01"
              min="0"
              id="trans-cost"
              name="trans-cost"
              required
            />

            <label for="trans-location-city">Location</label>
            <select
              id="trans-location-city"
              name="trans-location-city"
              required
            >
              <option value="">Please choose a city</option>
              <option value="Nairobi">Nairobi</option>
              <option value="Kigali">Kigali</option>
            </select>

            <label for="trans-date">Date & Time</label>
            <input type="date" id="trans-date" name="trans-date" required />

            <label for="trans-category">Category</label>
            <select id="trans-category" name="trans-category" required>
              <option value="">Please choose an option</option>
              <option value="Food">Food</option>
              <option value="Books">Books</option>
              <option value="Transport">Transport</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Health">Health</option>
            </select>
            <button
              type="submit"
              id="transdetails-submit"
              class="btn btn-primary"
            >
              Submit Transaction
            </button>
            <button
              id="transdetails-cancel"
              type="button"
              class="btn btn-secondary"
            >
              Cancel
            </button>
            <!--With Confirmation-->
          </fieldset>
        </form>
      </section>
      <br />
      <button id="addtransaction-btn" class="btn btn-primary">
        Add Transaction
      </button>
    </main>
    <footer>
      <p>Created by Nadiv Gicheru 😜</p>
      <p>&copy; 2026</p>
    </footer>
  </body>
</html>
